<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 25px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 400px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #resultado {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            background-color: #e9ecef;
            display: none;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Calculadora de IMC</h2>
        <div class="form-group">
            <label for="altura">Altura (ex: 1.75):</label>
            <input type="number" id="altura" step="0.01" placeholder="Digite sua altura em metros" required>
        </div>
        <div class="form-group">
            <label for="peso">Peso Atual (ex: 70.5):</label>
            <input type="number" id="peso" step="0.1" placeholder="Digite seu peso em kg" required>
        </div>
        <button onclick="processarIMC()">Calcular e Mostrar</button>

        <div id="resultado"></div>
    </div>

    <script src="Atividade10.js"></script>
</body>
</html>
